server {
    listen 80;
    server_name localhost; # Replace with your domain, e.g., erp.legrandtransporteur.com

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name localhost; # Replace with your domain

    ssl_certificate /etc/letsencrypt/live/localhost/fullchain.pem; # Replace localhost with domain
    ssl_certificate_key /etc/letsencrypt/live/localhost/privkey.pem; # Replace localhost with domain

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
